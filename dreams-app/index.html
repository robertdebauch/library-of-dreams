<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dreams App Basis</title>
</head>

<body>
  <div id="dreams-app">
    <div class="dreams-controls">
      <div class="dreams-filter">
        <span class="dreams-filter__label">Chapter of the experience</span>
        <div class="tab-divider"></div>
        <div class="dreams-filter__tabs" id="filter-tabs">
          <!-- табы вставятся динамически -->
        </div>
      </div>

      <div class="dreams-sort">
        <span class="dreams-sort__label">Order by</span>
        <div class="tab-divider"></div>
        <div class="dreams-sort__tabs" id="sort-tabs">
          <button class="dreams-sort__tab dreams-sort__tab--active" data-sort="id-asc">As Added</button>
          <button class="dreams-sort__tab" data-sort="year-desc">Recent</button>
          <button class="dreams-sort__tab" data-sort="year-asc">Timeline</button>
          <button class="dreams-sort__tab" data-sort="location-asc">A-Z</button>
          <button class="dreams-sort__tab" data-sort="location-desc">Z-A</button>
        </div>
      </div>
    </div>

    
    <div class="dreams-count">Total dreams: <span id="dreams-count-value">0</span></div>

    
    <div class="dreams-grid" id="dreams-grid"></div>

    
    <div id="dreams-bottom-bar" class="dreams-bottom-bar">
      <div id="dreams-player" class="dreams-player" style="display: none;">
        <button id="player-toggle" class="player-toggle">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M7 4v16l13 -8z" />
          </svg>
        </button>
        <span id="player-info" class="player-info"></span>
      </div>
      <button id="ambient-toggle" class="ambient-btn" title="Фоновый звук">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 17a3 3 0 1 0 6 0a3 3 0 0 0 -6 0" />
          <path d="M13 17a3 3 0 1 0 6 0a3 3 0 0 0 -6 0" />
          <path d="M9 17v-13h10v13" />
          <path d="M9 8h10" />
        </svg>
      </button>
    </div>

    <div id="secret-reset" class="secret-reset" title="Reset progress (3)"></div>

  </div>


  <script src="https://cdn.jsdelivr.net/npm/howler@2.2.4/dist/howler.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>


  <link rel="stylesheet" href="./style.css">
  <script src="./script.js"></script>
</body>

</html>
